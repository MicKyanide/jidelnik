<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#16a34a">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Jídelník">
<title>Jídelník</title>
<style>
:root{
  --bg:#0f1115;--card:#1a1d24;--card2:#222732;--card3:#2a2f3c;
  --txt:#e8eaed;--mut:#9aa3af;--acc:#22c55e;--acc2:#16a34a;
  --line:#2c313c;--star:#fbbf24;--danger:#ef4444;
  --veg:#22c55e;--kure:#f59e0b;--vepr:#fb7185;--hovez:#a78bfa;--ryba:#38bdf8;--sweet:#e879c9;
  --kcal:#fb923c;--prot:#34d399;--carb:#60a5fa;--fat:#f472b6;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:16px}
body{padding-bottom:80px;max-width:680px;margin:0 auto}
h1,h2,h3{margin:0}
.head{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,var(--bg) 70%,transparent);padding:14px 16px 6px}
.head h1{font-size:20px;display:flex;align-items:center;gap:8px}
.head .sub{color:var(--mut);font-size:13px;margin-top:2px}
.wrap{padding:0 16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin:10px 0}
.daycard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px 14px;margin:10px 0;transition:border-color .2s}
.daycard.today{border-color:rgba(34,197,94,.5);background:linear-gradient(135deg,rgba(22,163,74,.07),var(--card))}
.summary{background:linear-gradient(135deg,#15321f,#1a1d24);border:1px solid var(--line);border-radius:16px;padding:14px;margin:10px 0}
.row{display:flex;align-items:center;gap:10px}
.spread{justify-content:space-between}
.tag{font-size:11px;padding:3px 8px;border-radius:999px;font-weight:600;white-space:nowrap}
.t-veg{background:rgba(34,197,94,.15);color:var(--veg)}
.t-kure{background:rgba(245,158,11,.15);color:var(--kure)}
.t-vepr{background:rgba(251,113,133,.15);color:var(--vepr)}
.t-hovez{background:rgba(167,139,250,.15);color:var(--hovez)}
.t-ryba{background:rgba(56,189,248,.15);color:var(--ryba)}
.t-sweet{background:rgba(232,121,201,.15);color:var(--sweet)}
.meal{padding:10px 0;border-bottom:1px solid var(--line)}
.meal:last-child{border-bottom:none}
.meal .lbl{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.meal .name{font-weight:600;font-size:15px}
.meal.cooked .name{color:var(--mut);text-decoration:line-through}
.cook-btn{background:none;border:1.5px solid var(--line);border-radius:8px;padding:3px 9px;font-size:12px;color:var(--mut);cursor:pointer;white-space:nowrap;transition:all .15s}
.cook-btn.done{border-color:var(--acc);color:var(--acc);background:rgba(34,197,94,.1)}
.day{font-weight:700;font-size:15px;margin-bottom:2px}
.btn{background:var(--acc2);color:#fff;border:none;border-radius:12px;padding:11px 14px;font-size:15px;font-weight:600;cursor:pointer;transition:transform .1s}
.btn:active{transform:scale(.97)}
.btn.ghost{background:var(--card2);color:var(--txt)}
.btn.sm{padding:7px 11px;font-size:13px;border-radius:10px}
.btn.block{width:100%}
.btn.danger{background:rgba(239,68,68,.15);color:var(--danger)}
.swap{background:var(--card2);border:1px solid var(--line);color:var(--mut);border-radius:10px;padding:6px 10px;font-size:13px;cursor:pointer}
.stars{display:inline-flex;gap:3px;font-size:22px;line-height:1;cursor:pointer;user-select:none}
.stars .s{color:#3a404c;transition:color .1s}
.stars .s.on{color:var(--star)}
.stars.sm{font-size:16px}
.muted{color:var(--mut);font-size:13px}
.macros{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
.mb{font-size:11px;font-weight:700;padding:3px 7px;border-radius:7px;display:inline-flex;gap:4px;align-items:center}
.m-kcal{background:rgba(251,146,60,.15);color:var(--kcal)}
.m-prot{background:rgba(52,211,153,.15);color:var(--prot)}
.m-carb{background:rgba(96,165,250,.15);color:var(--carb)}
.m-fat{background:rgba(244,114,182,.15);color:var(--fat)}
.bars{display:flex;height:8px;border-radius:5px;overflow:hidden;margin-top:8px;background:#2a2f3a}
.bars i{display:block;height:100%}
.bignum{font-size:26px;font-weight:800}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;text-align:center;margin-top:6px}
.grid4 .v{font-size:17px;font-weight:700}
.grid4 .k{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.4px}
.filters{display:flex;gap:8px;overflow-x:auto;padding:4px 0 10px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;background:var(--card2);border:1px solid var(--line);color:var(--mut);border-radius:999px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s,color .15s}
.chip.on{background:var(--acc2);color:#fff;border-color:var(--acc2)}
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(20,23,29,.96);backdrop-filter:blur(10px);border-top:1px solid var(--line);display:flex;z-index:30;max-width:680px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom)}
.nav button{flex:1;background:none;border:none;color:var(--mut);padding:9px 0 8px;font-size:11px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s}
.nav button .ic{font-size:21px}
.nav button.on{color:var(--acc)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;display:none;align-items:flex-end;justify-content:center}
.modal.open{display:flex}
.sheet{background:var(--card);width:100%;max-width:680px;max-height:90vh;overflow-y:auto;border-radius:20px 20px 0 0;padding:18px 16px 32px;animation:up .22s ease}
@keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
.pick{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 4px;border-bottom:1px solid var(--line);cursor:pointer;border-radius:8px;transition:background .1s}
.pick:active,.pick:hover{background:var(--card2)}
.handle{width:40px;height:4px;background:#3a404c;border-radius:2px;margin:0 auto 14px}
ul.ing{list-style:none;padding:0;margin:8px 0}
ul.ing li{padding:6px 0;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:10px}
ol.steps{margin:8px 0;padding-left:20px}
ol.steps li{padding:4px 0;line-height:1.5}
.check{display:flex;align-items:flex-start;gap:10px;padding:9px 2px;border-bottom:1px solid var(--line)}
.check input{width:20px;height:20px;accent-color:var(--acc);margin-top:2px;flex-shrink:0}
.check.done label{opacity:.45}
.check.done .cname{text-decoration:line-through}
.shop-cat{font-size:12px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;padding:14px 2px 4px;display:flex;align-items:center;gap:6px}
.shop-cat .cnt{background:var(--card2);border-radius:6px;padding:1px 7px;font-size:11px;font-weight:700}
.sectlabel{font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 4px;font-weight:700}
.empty{color:var(--mut);text-align:center;padding:30px 10px}
.pill-q{font-size:10px;background:rgba(56,189,248,.15);color:var(--ryba);padding:2px 6px;border-radius:6px;font-weight:700}
.pill-cl{font-size:10px;background:rgba(96,165,250,.18);color:var(--carb);padding:2px 6px;border-radius:6px;font-weight:700}
.note{background:var(--card2);border-radius:12px;padding:10px 12px;font-size:13px;color:var(--mut);margin:8px 0}
a{color:var(--acc)}
label.fld{display:block;margin:10px 0 4px;font-size:13px;color:var(--mut);font-weight:600}
input.in,select.in,textarea.in{width:100%;background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:10px;font-size:15px;font-family:inherit;outline:none;transition:border-color .15s}
input.in:focus,select.in:focus,textarea.in:focus{border-color:var(--acc2)}
textarea.in{min-height:90px;resize:vertical}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.four{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.badge-custom{font-size:10px;background:rgba(34,197,94,.15);color:var(--acc);padding:2px 7px;border-radius:6px;font-weight:700}
.scaler{display:inline-flex;align-items:center;background:var(--card2);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.scaler button{background:none;border:none;color:var(--txt);width:36px;height:34px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.scaler button:active{background:var(--card3)}
.scaler span{padding:0 10px;font-weight:700;font-size:14px;min-width:44px;text-align:center}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(8px);background:#22293a;border:1px solid #3a4a5a;border-radius:12px;padding:10px 18px;font-size:14px;font-weight:600;z-index:100;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap;max-width:calc(100% - 32px)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.add-manual{display:flex;gap:8px;margin:10px 0}
.add-manual input{flex:1}
</style>
</head>

// ═══════════════════════════════════════════
// AMOUNT PARSING & AGGREGATION
// ═══════════════════════════════════════════
function parseNum(s){
  s=String(s).replace(/½/g,"0.5").replace(/¼/g,"0.25").replace(/¾/g,"0.75").replace(",",".");
  const r=s.match(/(\d+(?:\.\d+)?)\s*[–\-]\s*(\d+(?:\.\d+)?)/);if(r)return(+r[1]+ +r[2])/2;
  const m=s.match(/(\d+(?:\.\d+)?)/);return m?+m[0]:null;
}
// Sečte množství stejné suroviny napříč recepty → text k zobrazení
function mergeAmounts(amts){
  const SKIP=/podáv|posyp|ozdob|chuť|volit|potření|pánev|přeli|k podá|na ozd/i;
  const valid=amts.filter(a=>a&&!SKIP.test(a));
  if(!valid.length)return"";
  const b={},other=[];
  for(const raw of valid){
    const s=raw.toLowerCase().replace(/½/g,"0.5").replace(/¼/g,"0.25").replace(/¾/g,"0.75").replace(",",".");
    const n=parseNum(s);
    if(/kg/.test(s)){b.g=(b.g||0)+(n||1)*1000;continue}
    if(/\bg\b/.test(s)){b.g=(b.g||0)+(n||0);continue}
    if(/\bl\b/.test(s)){b.ml=(b.ml||0)+(n||1)*1000;continue}
    if(/ml/.test(s)){b.ml=(b.ml||0)+(n||0);continue}
    if(/lžičk|čajov/.test(s)){b.tsp=(b.tsp||0)+(n||1);continue}
    if(/lžíc|lžic|polév/.test(s)){b.tbsp=(b.tbsp||0)+(n||1);continue}
    if(/konzerv|plechov/.test(s)){b.konz=(b.konz||0)+(n||1);continue}
    if(/balení/.test(s)){b.bal=(b.bal||0)+(n||1);continue}
    if(/\bks\b|kus/.test(s)){b.ks=(b.ks||0)+(n||1);continue}
    if(/stroužk|stroužek/.test(s)){b.strz=(b.strz||0)+(n||1);continue}
    if(/plátk|plátek/.test(s)){b.pltk=(b.pltk||0)+(n||1);continue}
    if(/hrst/.test(s)){b.hrst=(b.hrst||0)+(n||1);continue}
    if(n!==null){b.ks=(b.ks||0)+n;continue}
    other.push(raw);
  }
  const parts=[];
  if(b.g!==undefined){const g=b.g;if(g>=950)parts.push(`~${Math.round(g/100)/10} kg`);else if(g>=1)parts.push(`${Math.round(g)} g`)}
  if(b.ml!==undefined){const ml=b.ml;parts.push(ml>=950?`~${Math.round(ml/100)/10} l`:`${Math.round(ml)} ml`)}
  if(b.tbsp)parts.push(`${b.tbsp} lžíce`);
  if(b.tsp)parts.push(`${b.tsp} lžičky`);
  if(b.konz)parts.push(`${b.konz}× konzerva`);
  if(b.bal)parts.push(`${b.bal}× balení`);
  if(b.strz)parts.push(`${b.strz} stroužků`);
  if(b.pltk)parts.push(`${b.pltk} plátků`);
  if(b.hrst)parts.push(`${b.hrst} hrst`);
  if(b.ks&&!b.g&&!b.ml&&!b.pltk)parts.push(`${Math.round(b.ks*10)/10} ks`);
  parts.push(...other);
  return parts.filter(Boolean).join(" + ");
}
function shopCatId(name){const n=name.toLowerCase();for(const cat of SHOP_CATS){if(cat.keys.some(k=>n.includes(k)))return cat.id}return"ostatni"}

// Odhad maker
function findMacro(name){const n=name.toLowerCase();for(const e of NUTR)for(const k of e[0])if(n.includes(k))return e[1];return null}
function pieceW(name,table,def){const n=name.toLowerCase();for(const e of table)for(const k of e[0])if(n.includes(k))return e[1];return def}
function gramsOf(name,amt){
  if(!amt)return 0;const a=amt.toLowerCase();
  if(/podáv|posyp|ozdob|chuť|chuti|volit|potření|pánev|přeli/.test(a))return 0;
  const num=parseNum(a);
  if(/lžičk|čajov/.test(a))return(num||1)*5;
  if(/lžíc|lžic|polév/.test(a))return(num||1)*15;
  if(/stroužek|stroužk/.test(a))return(num||1)*5;
  if(/konzerv|plechov/.test(a))return(num||1)*pieceW(name,CANS,400);
  if(/balení/.test(a))return(num||1)*400;
  if(/plátk|plátek/.test(a))return(num||1)*pieceW(name,PIECE,25);
  if(/hrst/.test(a))return(num||1)*20;
  if(/svazek|svazk/.test(a))return(num||1)*30;
  if(/špetk/.test(a))return 1;
  if(/kostk/.test(a))return(num||0.5)*40;
  if(/\bks\b|kus/.test(a))return(num||1)*pieceW(name,PIECE,100);
  if(/kg/.test(a))return(num||0)*1000;
  if(/ml/.test(a))return num||0;
  if(/\bg\b|gram/.test(a))return num||0;
  if(/(^|\s)l(\s|$|itr)/.test(a))return(num||0)*1000;
  if(num!=null)return num*pieceW(name,PIECE,100);
  return 0;
}
function estimate(ing,porce){let k=0,p=0,c=0,f=0;
  for(const a of ing){const g=gramsOf(a[0],a[1]),m=findMacro(a[0]);if(!m||!g)continue;k+=m[0]*g/100;p+=m[1]*g/100;c+=m[2]*g/100;f+=m[3]*g/100}
  const d=porce||1;return{kcal:Math.round(k/d),p:Math.round(p/d),c:Math.round(c/d),f:Math.round(f/d)}
}
function parseIngText(t){return(document.getElementById(t)?.value||"").trim().split("\n").map(l=>l.trim()).filter(Boolean).map(l=>{const p=l.split("|");return[p[0].trim(),(p[1]||"").trim()]})}

// Škálování porcí – vynásobí čísla v množství
function scaleAmt(amt,factor){
  if(!amt||factor===1)return amt;
  if(/posyp|ozdob|chuť|potření|pánev|přeli|k podá/i.test(amt))return amt;
  return amt.replace(/(\d+(?:[,.]\d+)?|½|¼|¾)/g,m=>{const n=parseNum(m);if(n===null)return m;const v=Math.round(n*factor*10)/10;return v%1===0?String(v):String(v).replace(".",",")});
}

// ═══════════════════════════════════════════
// PLAN ENGINE (s pravidlem: stejný recept max 1× za 2 týdny)
// ═══════════════════════════════════════════
function currentWeek(){
  const d=new Date(),td=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=td.getUTCDay()||7;td.setUTCDate(td.getUTCDate()+4-day);
  const y=td.getUTCFullYear(),ys=new Date(Date.UTC(y,0,1));
  return y+"-W"+String(Math.ceil(((td-ys)/86400000+1)/7)).padStart(2,"0");
}
function weekNum(w){const[y,n]=w.split("-W");return+y*100+ +n}
function isRecentlyUsed(id){const rw=LS.history[id]?weekNum(LS.history[id]):0;return weekNum(currentWeek())-rw<2}

// Z dinner poolu vyřadí jídla se stejnou přílohou jako oběd (když po vyřazení něco zbyde)
function dinnerPool(dinner,lunch){
  const ls=mealSide(lunch);
  if(!ls)return dinner;
  const f=dinner.filter(r=>mealSide(r)!==ls);
  return f.length?f:dinner;
}
function pickWeighted(pool,used){
  const fresh=pool.filter(r=>!used.has(r.id)&&!isRecentlyUsed(r.id));
  const cand=fresh.length?fresh:pool.filter(r=>!used.has(r.id));
  const arr=cand.length?cand:pool;
  let tot=arr.reduce((s,r)=>s+weight(r.id),0),x=Math.random()*tot;
  for(const r of arr){x-=weight(r.id);if(x<=0)return r}
  return arr[arr.length-1];
}
function recordHistory(m){const cw=currentWeek(),h=LS.history;for(const d in m){if(m[d].obed)h[m[d].obed]=cw;if(m[d].vecere)h[m[d].vecere]=cw}LS.history=h}
function genMenu(){
  const all=getAll(),lunch=all.filter(r=>r.meals.includes("obed")),dinner=all.filter(r=>r.meals.includes("vecere")&&r.time<=35);
  const used=new Set(),m={};
  for(const d of days()){
    const o=pickWeighted(lunch,used);used.add(o.id);
    const v=pickWeighted(dinnerPool(dinner,o),used);used.add(v.id);
    m[d]={obed:o.id,vecere:v.id};
  }
  recordHistory(m);LS.menu=m;LS.bought=[];LS.confirmed=null;LS.cooked={};return m;
}
function ensureMenu(){
  let m=LS.menu||{},changed=false;
  const used=new Set();
  for(const d of days()){if(m[d]&&byId(m[d].obed))used.add(m[d].obed);if(m[d]&&byId(m[d].vecere))used.add(m[d].vecere)}
  const all=getAll(),lunch=all.filter(r=>r.meals.includes("obed")),dinner=all.filter(r=>r.meals.includes("vecere")&&r.time<=35);
  for(const d of days()){
    if(!m[d]||!byId(m[d].obed)){const o=pickWeighted(lunch,used);used.add(o.id);m[d]={...(m[d]||{}),obed:o.id};changed=true}
    if(!m[d]||!byId(m[d].vecere)){const lunchR=byId(m[d].obed);const v=pickWeighted(lunchR?dinnerPool(dinner,lunchR):dinner,used);used.add(v.id);m[d]={...(m[d]||{}),vecere:v.id};changed=true}
  }
  if(changed){LS.menu=m;recordHistory(m)}
  return m;
}
function applyPlan(){
  if(!PLAN?.menu||localStorage.getItem("jid_plan_version")===PLAN.version)return;
  if(PLAN.start)LS.start=Math.max(0,ALLDAYS.indexOf(PLAN.start));
  LS.menu=JSON.parse(JSON.stringify(PLAN.menu));LS.bought=[];LS.confirmed=null;LS.cooked={};
  LS.eatOut=PLAN.eatOut?[...PLAN.eatOut]:[];
  recordHistory(LS.menu);
  localStorage.setItem("jid_plan_version",PLAN.version);
}

function copyConf(ev){
  const t=document.getElementById("confTxt");t.focus();t.select();t.setSelectionRange(0,99999);
  let ok=false;
  if(navigator.clipboard?.writeText){navigator.clipboard.writeText(t.value).catch(()=>{});ok=true}
  else{try{ok=document.execCommand("copy")}catch(e){}}
  if(ev?.target)ev.target.textContent=ok?"✅ Zkopírováno – vlož do chatu":"Označ text ručně";
}

let _swapDay,_swapSlot,_swapLunch,_swapQuery="",_swapCat="all";
function openSwap(day,slot){
  _swapDay=day;_swapSlot=slot;_swapLunch=slot==="obed";_swapQuery="";_swapCat="all";
  renderSwap(true);
  sheet.dataset.swapActive="1";sheet.dataset.swapDay=day;sheet.dataset.swapSlot=slot;
}
function renderSwap(full){
  let pool=getAll().filter(r=>r.meals.includes(_swapLunch?"obed":"vecere"));
  if(_swapCat!=="all")pool=pool.filter(r=>_swapCat==="carbload"?r.cl:r.cat===_swapCat);
  if(_swapQuery){const q=_swapQuery.toLowerCase();pool=pool.filter(r=>r.name.toLowerCase().includes(q))}
  pool=pool.slice().sort((a,b)=>weight(b.id)-weight(a.id));
  const list=pool.map(r=>`<div class="pick" data-swap-id="${r.id}">
    <div><div style="font-weight:600">${r.name}</div>
      <div class="row" style="gap:6px;margin-top:4px">${catTag(r.cat)} ${flags(r)} <span class="muted">${r.time} min · 🔥 ${r.kcal} · B ${r.p}g</span></div></div>
    ${starsHTML(r.id,'sm')}</div>`).join("")||'<div class="empty">Nic nenalezeno</div>';
  if(!full){document.getElementById("swapList").innerHTML=list;return}
  let cats=`<div class="filters" id="swapFilters">
    <div class="chip ${_swapCat==='all'?'on':''}" data-sc="all">Vše</div>
    <div class="chip ${_swapCat==='carbload'?'on':''}" data-sc="carbload">🍚 Carb</div>`;
  for(const c of["veg","kure","vepr","hovez","ryba","sweet"])cats+=`<div class="chip ${_swapCat===c?'on':''}" data-sc="${c}">${CAT[c].e}</div>`;
  cats+=`</div>`;
  openModal(`<div class="handle"></div><h3>Vyber ${_swapLunch?'oběd':'večeři'} — ${dayFull(_swapDay)}</h3>
    <input class="in" id="swapSearch" style="margin:10px 0 4px" placeholder="🔎 Hledat…" value="${_swapQuery.replace(/"/g,'&quot;')}">
    ${cats}<div id="swapList">${list}</div>`);
  document.getElementById("swapSearch").addEventListener("input",e=>{_swapQuery=e.target.value;renderSwap(false)});
  document.getElementById("swapFilters").addEventListener("click",e=>{const c=e.target.closest("[data-sc]");if(c){_swapCat=c.dataset.sc;renderSwap(true)}});
}
function doSwap(day,slot,id){const m=LS.menu;m[day][slot]=id;LS.menu=m;LS.confirmed=null;recordHistory(m);closeModal();render()}

const SIDES=[
  {k:"spagety",l:"🍝 Těstoviny",m:["špagety","těstoviny","nudle","tagliatelle","lasagne"]},
  {k:"ryze",l:"🍚 Rýže",m:["rýže"]},
  {k:"brambory",l:"🥔 Brambory/gnocchi",m:["brambor","gnocchi","hranolky","batát"]},
  {k:"pecivo",l:"🥖 Pečivo/placky",m:["pečivo","chléb","toust","pita","naan","tortilla","bulka","bageta","knedlík"]}
];
function matchSide(r,k){const sd=SIDES.find(s=>s.k===k);return sd?r.ing.some(a=>sd.m.some(x=>a[0].toLowerCase().includes(x))):true}

function renderRecepty(){
  subtitle.textContent="Knihovna – hledej, filtruj, hodnoť";
  const all=getAll(),counts={},hidden=LS.removed.length;
  for(const r of all)counts[r.cat]=(counts[r.cat]||0)+1;
  let h=`<button class="btn block" onclick="openForm()">➕ Přidat recept</button>`;
  if(hidden)h+=`<button class="btn ghost block sm" style="margin-top:8px" onclick="restoreHidden()">♻️ Obnovit skryté recepty (${hidden})</button>`;
  h+=`<input class="in" id="recSearch" style="margin:10px 0 6px" placeholder="🔎 Hledat recept nebo surovinu…" value="${query.replace(/"/g,'&quot;')}" oninput="setQuery(this.value)">
    <div class="filters">
      <div class="chip ${filter==='all'?'on':''}" onclick="setFilter('all')">Vše (${all.length})</div>
      <div class="chip ${filter==='carbload'?'on':''}" onclick="setFilter('carbload')">🍚 Carb</div>`;
  for(const c of["veg","kure","vepr","hovez","ryba","sweet"])h+=`<div class="chip ${filter===c?'on':''}" onclick="setFilter('${c}')">${CAT[c].e} ${CAT[c].l}${counts[c]?' <span style="opacity:.6;font-size:10px">('+counts[c]+')</span>':''}</div>`;
  h+=`</div><div class="filters"><div class="chip ${fSide==='all'?'on':''}" onclick="setSide('all')">🍽️ Příloha: vše</div>`;
  for(const sd of SIDES)h+=`<div class="chip ${fSide===sd.k?'on':''}" onclick="setSide('${sd.k}')">${sd.l}</div>`;
  h+=`</div><div id="recList"></div>`;
  view.innerHTML=h;
  renderRecList();
}
function renderRecList(){
  let list=getAll().filter(r=>{
    if(filter!=="all"){if(filter==="carbload"){if(!r.cl)return false}else if(r.cat!==filter)return false}
    if(fSide!=="all"&&!matchSide(r,fSide))return false;
    if(query){const q=query.toLowerCase();if(!r.name.toLowerCase().includes(q)&&!r.ing.some(a=>a[0].toLowerCase().includes(q)))return false}
    return true;
  });
  list=list.slice().sort((a,b)=>rating(b.id)-rating(a.id)||a.name.localeCompare(b.name,'cs'));
  let h="";
  if(!list.length)h=`<div class="empty">Nic nenalezeno 🤷</div>`;
  for(const r of list){
    h+=`<div class="card"><div class="row spread">
      <div onclick="openRecipe('${r.id}')" style="flex:1;cursor:pointer"><div style="font-weight:600">${r.name} ${r.custom?'<span class="badge-custom">vlastní</span>':''}</div>
        <div class="row" style="gap:6px;margin-top:6px">${catTag(r.cat)} ${flags(r)}<span class="muted">${r.time} min · ${r.porce} porce</span></div>
        ${macroRow(r)}</div></div>
      <div style="margin-top:10px">${starsHTML(r.id)}</div></div>`;
  }
  const el=document.getElementById("recList");if(el)el.innerHTML=h;
}
function setFilter(f){filter=f;renderRecepty()}
function setSide(k){fSide=k;renderRecepty()}
function setQuery(v){query=v;renderRecList()}

      ${[["oba","🍲⚡ Oběd i večeře"],["obed","🍲 Jen oběd"],["vecere","⚡ Jen večeře"]].map(([m,l])=>{
        const cur=r.meals.includes("obed")&&r.meals.includes("vecere")?"oba":(r.meals[0]||"");

    </div>

  openModal(h);
}
function _delConfirm(id){
  const r=byId(id),custom=r&&r.custom;
  confirm2(custom?"Smazat vlastní recept?":"Skrýt recept z výběru?",()=>{
    if(LS.custom.some(x=>x.id===id))LS.custom=LS.custom.filter(x=>x.id!==id);

}
function restoreHidden(){LS.removed=[];render();toast("Skryté recepty obnoveny")}
// Přepíše zařazení receptu (oběd/večeře/obojí); projeví se při dalším generování
function setMeals(id,mode){
  const meals=mode==="oba"?["obed","vecere"]:[mode];

function _v(id){return(document.getElementById(id)?.value||"").trim()}
function _n(id){return Math.max(0,Math.round(+_v(id)||0))}
function calcMacros(){
  const ing=parseIngText("f_ing");
  if(!ing.length){toast("Nejdřív zadej suroviny.");return}
  const e=estimate(ing,_n("f_porce")||2);
  document.getElementById("f_kcal").value=e.kcal;document.getElementById("f_p").value=e.p;
  document.getElementById("f_c").value=e.c;document.getElementById("f_f").value=e.f;
  toast("Makra odhadnuta ze surovin");
}
function saveCustom(editId){
  const name=_v("f_name");
  if(!name){toast("Zadej název receptu.");return}
  const mealSel=_v("f_meal"),meals=mealSel==="oba"?["obed","vecere"]:[mealSel];
  const time=_n("f_time")||25,porce=_n("f_porce")||2;
  const ing=parseIngText("f_ing");
  const steps=_v("f_steps").split("\n").map(l=>l.trim()).filter(Boolean);
  let kcal=_n("f_kcal"),p=_n("f_p"),c=_n("f_c"),f=_n("f_f");
  if(!kcal&&!p&&!c&&!f){const e=estimate(ing,porce);kcal=e.kcal;p=e.p;c=e.c;f=e.f}
  const rec={id:editId||"c"+Date.now(),name,cat:_v("f_cat")||"veg",time,porce,meals,quick:time<=25,kcal,p,c,f,ing,steps,custom:true};
  let cu=LS.custom;
  cu=editId?cu.map(r=>r.id===editId?rec:r):[...cu,rec];
  LS.custom=cu;closeModal();tab="recepty";render();
  toast(editId?"Recept upraven":"Recept přidán");
}

function renderNakup(){
  subtitle.textContent="Nákupní seznam z týdne";
  const m=ensureMenu(),need={};
  for(const d of days())for(const slot of["obed","vecere"]){
    if(isEatOut(d,slot))continue;
    const r=byId(m[d][slot]);
    for(const a of r.ing){const n=a[0];if(!need[n])need[n]={amts:[],rec:new Set()};if(a[1])need[n].amts.push(a[1]);need[n].rec.add(r.name)}
  }
  const pantry=new Set(LS.pantry),bought=new Set(LS.bought),manual=LS.manualItems;
  const buy=[],spice=[];
  for(const n of Object.keys(need)){if(pantry.has(n))continue;(SPICES.has(n)?spice:buy).push(n)}
  const grouped={};for(const cat of SHOP_CATS)grouped[cat.id]=[];
  for(const n of buy)grouped[shopCatId(n)].push(n);

  let h=`<div class="note">Suroviny sečteny z týdne minus spíž. ✓ = koupeno.</div>
  <button class="btn block" onclick="shareShopping(event)">📤 Sdílet nákupní seznam</button>
  <div class="add-manual"><input class="in" id="manualInput" placeholder="Přidat položku ručně…"><button class="btn sm" onclick="addManual()">＋</button></div>`;
  if(manual.length){
    h+=`<div class="shop-cat">📝 Ruční položky <span class="cnt">${manual.filter(n=>!bought.has("_m_"+n)).length}</span></div>`;
    for(const n of manual)h+=manualCheckRow(n,bought.has("_m_"+n));
  }
  let anyBuy=false;
  for(const cat of SHOP_CATS){
    const items=grouped[cat.id];if(!items?.length)continue;anyBuy=true;
    h+=`<div class="shop-cat">${cat.l} <span class="cnt">${items.filter(n=>!bought.has(n)).length}</span></div>`;
    for(const n of items)h+=checkRow(n,need[n],bought.has(n));
  }
  if(!anyBuy&&!manual.length)h+=`<div class="empty">Nic nechybí 🎉</div>`;
  if(spice.length){
    h+=`<div class="shop-cat">🧂 Koření – zkontroluj <span class="cnt">${spice.filter(n=>!bought.has(n)).length}</span></div>`;
    for(const n of spice)h+=checkRow(n,need[n],bought.has(n));
  }
  const anyBought=[...bought].some(k=>k.startsWith("_m_")?manual.includes(k.slice(3)):need[k]);
  if(anyBought)h+=`<div style="margin-top:12px"><button class="btn ghost sm" onclick="clearBought()">🗑️ Smazat odškrtnuté</button></div>`;
  view.innerHTML=h;
  document.getElementById("manualInput")?.addEventListener("keydown",e=>{if(e.key==="Enter")addManual()});
}
function checkRow(n,info,done){
  const merged=mergeAmounts(info.amts),recips=[...info.rec].slice(0,2).join(", "),safe=n.replace(/'/g,"\\'");
  return`<div class="check ${done?'done':''}"><input type="checkbox" ${done?'checked':''} onchange="toggleBought('${safe}')">
    <label style="flex:1"><div class="cname">${n}${merged?` <span class="muted" style="font-size:12px">— ${merged}</span>`:''}</div>
    <div class="muted" style="font-size:11px">${recips}</div></label></div>`;
}
function manualCheckRow(n,done){
  const safe=n.replace(/'/g,"\\'");
  return`<div class="check ${done?'done':''}"><input type="checkbox" ${done?'checked':''} onchange="toggleBought('_m_${safe}')">
    <label style="flex:1;display:flex;align-items:center;justify-content:space-between">
      <span class="cname">${n}</span>
      <button style="background:none;border:none;color:var(--mut);cursor:pointer;font-size:16px;padding:0 4px" onclick="removeManual('${safe}')">×</button>
    </label></div>`;
}
function toggleBought(n){let b=new Set(LS.bought);b.has(n)?b.delete(n):b.add(n);LS.bought=[...b];renderNakup()}
function addManual(){const inp=document.getElementById("manualInput"),val=(inp?.value||"").trim();if(!val)return;const m=LS.manualItems;if(!m.includes(val)){m.push(val);LS.manualItems=m}if(inp)inp.value="";renderNakup()}
function removeManual(n){LS.manualItems=LS.manualItems.filter(x=>x!==n);let b=new Set(LS.bought);b.delete("_m_"+n);LS.bought=[...b];renderNakup()}
function clearBought(){let b=new Set(LS.bought);for(const k of[...b])if(!k.startsWith("_m_"))b.delete(k);LS.bought=[...b];renderNakup();toast("Odškrtnuté odstraněny")}

// Sestaví textový nákupní seznam (stejná logika jako záložka Nákup)
function buildShoppingText(){
  const m=ensureMenu(),need={};
  for(const d of days())for(const slot of["obed","vecere"]){
    if(isEatOut(d,slot))continue;
    const r=byId(m[d][slot]);
    for(const a of r.ing){const n=a[0];if(!need[n])need[n]={amts:[]};if(a[1])need[n].amts.push(a[1])}
  }
  const pantry=new Set(LS.pantry),grouped={},spice=[];
  for(const c of SHOP_CATS)grouped[c.id]=[];
  for(const n of Object.keys(need)){if(pantry.has(n))continue;if(SPICES.has(n)){spice.push(n);continue}grouped[shopCatId(n)].push(n)}
  const lines=["🛒 Nákupní seznam"];
  for(const cat of SHOP_CATS){
    const items=grouped[cat.id];if(!items.length)continue;
    lines.push("",cat.l);
    for(const n of items){const a=mergeAmounts(need[n].amts);lines.push("• "+n+(a?" – "+a:""))}
  }
  if(LS.manualItems.length){lines.push("","📝 Ruční položky");for(const n of LS.manualItems)lines.push("• "+n)}
  if(spice.length){lines.push("","🧂 Koření – zkontroluj");for(const n of spice)lines.push("• "+n)}
  return lines.join("\n");
}
async function shareShopping(ev){
  const text=buildShoppingText();
  if(navigator.share){
    try{await navigator.share({title:"Nákupní seznam",text});toast("Sdíleno ✓")}
    catch(e){/* uživatel zrušil */}
  }else{
    let ok=false;
    if(navigator.clipboard?.writeText){try{await navigator.clipboard.writeText(text);ok=true}catch(e){}}
    toast(ok?"Sdílení nepodporováno – zkopírováno do schránky":"Sdílení ani schránka nejsou dostupné");
  }
}

// ═══════════════════════════════════════════
// PANTRY VIEW
// ═══════════════════════════════════════════
function renderSpiz(){
  subtitle.textContent="Co máš doma (vyloučí se z nákupu)";
  const all=[...new Set(getAll().flatMap(r=>r.ing.map(i=>i[0])))].filter(n=>!SPICES.has(n)).sort((a,b)=>a.localeCompare(b,'cs'));
  const pantry=new Set(LS.pantry);
  const grouped={};for(const cat of SHOP_CATS)grouped[cat.id]=[];
  for(const n of all)grouped[shopCatId(n)].push(n);
  const total=all.filter(n=>pantry.has(n)).length;
  let h=`<div class="note">Zaškrtni suroviny, které máš doma – odečtou se z nákupu. Doma: ${total}/${all.length}</div>`;
  for(const cat of SHOP_CATS){
    const items=grouped[cat.id];if(!items?.length)continue;
    h+=`<div class="shop-cat">${cat.l} <span class="cnt">${items.filter(n=>pantry.has(n)).length}/${items.length}</span></div>`;
    for(const n of items){const safe=n.replace(/'/g,"\\'");h+=`<div class="check ${pantry.has(n)?'done':''}"><input type="checkbox" ${pantry.has(n)?'checked':''} onchange="togglePantry('${safe}')"><label style="flex:1" class="cname">${n}</label></div>`}
  }
  view.innerHTML=h;
}
function togglePantry(n){let p=new Set(LS.pantry);p.has(n)?p.delete(n):p.add(n);LS.pantry=[...p];renderSpiz()}

// ═══════════════════════════════════════════
// SETTINGS / EXPORT / IMPORT
// ═══════════════════════════════════════════
function openSettings(){
  openModal(`<div class="handle"></div><h2>⚙️ Nastavení & záloha</h2>
    <div class="sectlabel">Záloha dat</div>
    <div style="display:grid;gap:8px;margin-top:4px">
      <button class="btn ghost block" onclick="exportData()">📤 Exportovat data (JSON)</button>
      <label class="btn ghost block" style="display:block;text-align:center;cursor:pointer">📥 Importovat data (JSON)
        <input type="file" accept=".json" style="display:none" onchange="importData(this)"></label>
    </div>
    <div class="sectlabel" style="margin-top:16px">Nebezpečná zóna</div>
    <button class="btn danger block" style="margin-top:4px" onclick="confirmClearData()">🗑️ Smazat všechna data</button>
    <div class="note" style="margin-top:8px">Export uloží recepty, hodnocení, nákup, spíž a historii.</div>`);
}
function exportData(){
  const data={ratings:LS.ratings,menu:LS.menu,pantry:LS.pantry,bought:LS.bought,custom:LS.custom,history:LS.history,removed:LS.removed,manualItems:LS.manualItems,eatOut:LS.eatOut,mealsOverride:LS.mealsOverride,exportedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"}),url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=`jidelnik-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();
  URL.revokeObjectURL(url);toast("Data exportována");
}
function importData(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(d.ratings)LS.ratings=d.ratings;if(d.menu)LS.menu=d.menu;if(d.pantry)LS.pantry=d.pantry;
      if(d.bought)LS.bought=d.bought;if(d.custom)LS.custom=d.custom;if(d.history)LS.history=d.history;
      if(d.removed)LS.removed=d.removed;if(d.manualItems)LS.manualItems=d.manualItems;if(d.eatOut)LS.eatOut=d.eatOut;if(d.mealsOverride)LS.mealsOverride=d.mealsOverride;
      closeModal();render();toast("Data importována ✓");
    }catch(err){toast("Chyba při importu – zkontroluj soubor.")}
  };
  reader.readAsText(file);
}
function confirmClearData(){confirm2("Smazat všechna uložená data?",()=>{["jid_ratings","jid_menu","jid_pantry","jid_bought","jid_custom","jid_confirmed","jid_start","jid_cooked","jid_manual","jid_history","jid_removed","jid_eatout","jid_meals","jid_plan_version"].forEach(k=>localStorage.removeItem(k));render();toast("Data smazána")},"Smazat vše",true)}

// ═══════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════
const modal=document.getElementById("modal"),sheet=document.getElementById("sheet");
function openModal(html){sheet.innerHTML=html;modal.classList.add("open")}
function closeModal(){modal.classList.remove("open");sheet.dataset.swapActive=""}

// ═══════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════
document.addEventListener("click",e=>{
  const star=e.target.closest(".stars .s");
  if(star){const wrap=star.closest(".stars");setRating(wrap.dataset.rate,+star.dataset.v);if(tab==="recepty")renderRecList();else render();e.stopPropagation();return}
  if(sheet.dataset.swapActive==="1"){const pick=e.target.closest("[data-swap-id]");if(pick){doSwap(sheet.dataset.swapDay,sheet.dataset.swapSlot,pick.dataset.swapId);return}}
  if(e.target===modal)closeModal();
});
document.querySelectorAll(".nav button").forEach(b=>b.addEventListener("click",()=>{tab=b.dataset.tab;filter="all";fSide="all";query="";window.scrollTo(0,0);render()}));

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
applyPlan();
render();

if("serviceWorker" in navigator&&location.protocol.startsWith("http")){
  addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
